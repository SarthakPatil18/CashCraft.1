kind = "web"
previewPath = "/"
title = "CashCraft"
version = "1.0.0"
id = "artifacts/cashcraft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19849

[services.development]
run = "pnpm --filter @workspace/cashcraft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cashcraft", "run", "build" ]
publicDir = "artifacts/cashcraft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19849"
BASE_PATH = "/"
